services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-ai-analyst-db
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst_password
      POSTGRES_DB: enterprise_ai_analyst
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d enterprise_ai_analyst"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: enterprise-ai-analyst-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://analyst:analyst_password@postgres:5432/enterprise_ai_analyst
      STORAGE_DIR: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: enterprise-ai-analyst-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:
